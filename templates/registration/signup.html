{% extends "base.html" %}
{% load static %}
{% block title %}StarBuffet{% endblock %}
{% block content %}
<section class="login-auth">
    <div class="auth">
        <h2>Inscription</h2>
        <form method="post">
            {% csrf_token %}
            <div class="mail">
                <label for="mail">Nom Utilisateur</label>
                <input type="text" id="mail" name="username">
            </div>
            <div class="pass">
                <label for="passe">Mot de passe</label>
                <input type="password" id="passe" name="password1">
            </div>
            <div class="pass">
                <label for="passe">Mot de passe</label>
                <input type="password" id="passe" name="password2">
            </div>
            <div class="but">
                <button type="submit">S'inscrire</button>
            </div>
        </form>
    </div>
</section>
{% endblock %}
